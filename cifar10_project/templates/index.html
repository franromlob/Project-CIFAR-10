<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>CIFAR-10 Classifier</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h1 class="text-center mb-4">CIFAR-10 Image Classifier 🤖</h1>

      <div class="card shadow-sm p-4 mb-5">
        <form method="post" enctype="multipart/form-data">
          <label class="form-label fw-bold">Sube una o varias imágenes:</label>
          <input
            type="file"
            name="files"
            multiple
            class="form-control mb-3"
            accept="image/*"
          />
          <button type="submit" class="btn btn-primary w-100">
            Analizar Imágenes
          </button>
        </form>
      </div>

      {% if results %}
      <div class="row">
        {% for res in results %}
        <div class="col-md-4 mb-4">
          <div class="card h-100 shadow-sm">
            <img
              src="{{ res.path }}"
              class="card-img-top"
              style="height: 150px; object-fit: contain; background: #eee"
            />
            <div class="card-body">
              <h5 class="card-title text-uppercase">{{ res.prediction }}</h5>
              <p class="text-muted">Confianza: {{ res.confidence }}</p>
              <button
                class="btn btn-sm btn-outline-secondary"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#prob{{loop.index}}"
              >
                Ver Probabilidades
              </button>
              <div class="collapse mt-2" id="prob{{loop.index}}">
                <ul class="list-group list-group-flush small">
                  {% for c, p in res.probs.items() %}
                  <li class="list-group-item d-flex justify-content-between">
                    <span>{{c}}</span><strong>{{p}}</strong>
                  </li>
                  {% endfor %}
                </ul>
              </div>
            </div>
          </div>
        </div>
        {% endfor %}
      </div>
      {% endif %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
